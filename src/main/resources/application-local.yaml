spring:
  cloud:
    config:
      import-check:
        enabled: false
      discovery:
        enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA:payment}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:payment}
        hbm2ddl:
          create_schemas: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

toss:
  secret-key: ${TOSS_SECRET_KEY}

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      toss:
        sliding-window-size: 10                      # 최근 10건 기준으로 실패율 계산
        failure-rate-threshold: 50                   # 50% 이상 실패 → OPEN
        wait-duration-in-open-state: 10s             # 10초 대기 후 HALF-OPEN 전환
        permitted-number-of-calls-in-half-open-state: 3  # HALF-OPEN에서 3건 시도 후 판단
        register-health-indicator: true