spring:
  application:
    name: payment

  main:
    allow-bean-definition-overriding: true  # common에서 정의가 겹쳐서 에러나길래, 추가

  cloud:
    config:
      import-check:
        enabled: false  #로컬 개발용 config 차단
      discovery:
        enabled: false  #로컬 개발용 config 차단

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


eureka:
  client:
    register-with-eureka: false  # 로컬 개발용 eruka 차단
    fetch-registry: false        # 로컬 개발용 eruka 차단

toss:
  secret-key: ${TOSS_SECRET_KEY}
