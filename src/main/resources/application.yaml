spring:
  application:
    name: payment-service

  main:
    allow-bean-definition-overriding: true

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true

  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:10002}"


  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA:payment}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:10001/eureka/}


feign:
  circuitbreaker:
    enabled: true
  httpclient:
    hc5:
      enabled: true
    max-connections: 200
    max-connections-per-route: 50

resilience4j:
  circuitbreaker:
    instances:
      toss:
        sliding-window-size: 10                      # 최근 10건 기준으로 실패율 계산
        failure-rate-threshold: 50                   # 50% 이상 실패 → OPEN
        wait-duration-in-open-state: 10s             # 10초 대기 후 HALF-OPEN 전환
        permitted-number-of-calls-in-half-open-state: 3  # HALF-OPEN에서 3건 시도 후 판단
        register-health-indicator: true